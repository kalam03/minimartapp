<div class="h-screen flex flex-col overflow-hidden bg-gray-50">
  <!-- Mobile Header - Minimal -->
  <div class="md:hidden fixed top-0 left-0 right-0 shadow-sm z-30 px-3 py-2" style="background: linear-gradient(135deg, var(--theme-primary), var(--theme-primary-light))">
    <div class="flex justify-between items-center">
      <button
        (click)="toggleMobileMenu()"
        class="p-1.5 rounded-lg transition-colors" style="color: var(--theme-accent)"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
      <div class="font-bold text-sm" style="color: var(--theme-accent)">Lucky Shop</div>
      <div class="w-5"></div>
    </div>
  </div>

  <!-- Sidebar Overlay (Mobile) -->
  <div
    *ngIf="isMobile() && isMobileMenuOpen()"
    class="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity duration-300"
    (click)="closeMobileMenu()"
  ></div>

  <!-- Sidebar -->
  <aside
    [class]="'fixed left-0 top-0 h-full shadow-xl transition-all duration-300 z-50 overflow-y-auto ' + getSidebarWidthClass()"
    [class.overflow-hidden]="isMobile() && !isMobileMenuOpen()"
    style="background: linear-gradient(180deg, var(--theme-primary) 0%, var(--theme-primary-light) 50%, var(--theme-primary) 100%)"
  >
    <div class="flex flex-col h-full">

      <!-- Logo Section — height matches desktop header -->
      <div class="flex items-center justify-between px-3 py-2" style="background:var(--theme-primary); border-bottom: 1px solid var(--theme-border); min-height: 40px">
        <div *ngIf="!isMobile() && !isSidebarMinimized()" class="flex items-center gap-2">
          <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0" style="background: var(--theme-accent)">
            <svg class="w-4 h-4" fill="none" stroke="var(--theme-primary)" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
          <span class="font-semibold text-sm text-white">Lucky Shop</span>
        </div>
        <div *ngIf="isSidebarMinimized() && !isMobile()" class="w-full flex justify-center">
          <div class="w-6 h-6 rounded-md flex items-center justify-center" style="background: var(--theme-accent)">
            <svg class="w-4 h-4" fill="none" stroke="var(--theme-primary)" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
        </div>
        <div *ngIf="isMobile()" class="flex items-center gap-2">
          <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0" style="background: var(--theme-accent)">
            <svg class="w-4 h-4" fill="none" stroke="var(--theme-primary)" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
          <span class="font-semibold text-sm text-white">Lucky Shop</span>
        </div>

        <button *ngIf="!isMobile()" (click)="toggleSidebar()"
          class="p-1 rounded-md transition-colors flex-shrink-0" style="color: var(--theme-accent)"
          onmouseover="this.style.background='var(--theme-hover)'" onmouseout="this.style.background='transparent'">
          <svg *ngIf="!isSidebarMinimized()" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
          </svg>
          <svg *ngIf="isSidebarMinimized()" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
          </svg>
        </button>
        <button *ngIf="isMobile()" (click)="closeMobileMenu()"
          class="p-1 rounded-md transition-colors" style="color: var(--theme-accent)">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- User Profile -->
      <div *ngIf="!isSidebarMinimized() || isMobile()" class="px-3 py-2" style="border-bottom: 1px solid var(--theme-border)">
        <div class="flex items-center gap-2">
          <img [src]="user.avatar" alt="Avatar" class="w-7 h-7 rounded-full" style="outline: 1.5px solid var(--theme-accent)">
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-xs truncate text-white">{{ user.name }}</p>
            <p class="text-xs truncate" style="color: var(--theme-accent)">{{ user.email }}</p>
          </div>
        </div>
      </div>
      <div *ngIf="isSidebarMinimized() && !isMobile()" class="px-3 py-2 flex justify-center" style="border-bottom: 1px solid var(--theme-border)">
        <img [src]="user.avatar" alt="Avatar" class="w-7 h-7 rounded-full" style="outline: 1.5px solid var(--theme-accent)">
      </div>

      <!-- Sidebar Search (hidden when minimized) -->
      <div *ngIf="!isSidebarMinimized() || isMobile()" class="px-2 py-1.5" style="border-bottom:1px solid var(--theme-border)">
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-2 flex items-center pointer-events-none">
            <svg class="w-3 h-3" fill="none" stroke="var(--theme-text-dim)" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <input
            type="text"
            [(ngModel)]="navSearch"
            [placeholder]="'shared.search.menuPlaceholder' | transloco"
            class="w-full pl-6 pr-2 py-1 text-xs rounded-md outline-none border-0"
            style="background:rgba(255,255,255,0.08); color:var(--theme-text); caret-color:var(--theme-accent);"
            onfocus="this.style.background='rgba(255,255,255,0.14)'"
            onblur="this.style.background='rgba(255,255,255,0.08)'"
          />
          <button *ngIf="navSearch" (click)="navSearch=''"
            class="absolute inset-y-0 right-1.5 flex items-center" style="color:var(--theme-text-dim)">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 overflow-y-auto py-1.5">
        <ul class="space-y-0.5 px-2">
          <li *ngFor="let item of filteredNavItems; let i = index">
            <a
              [routerLink]="item.path"
              routerLinkActive="nav-active"
              [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
              (click)="setActiveItem(i)"
              [class]="'flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg text-xs transition-all ' +
                (isSidebarMinimized() && !isMobile() ? 'justify-center' : '')"
              style="color: var(--theme-text)"
              [title]="isSidebarMinimized() && !isMobile() ? navLabel(item) : ''"
            >
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"></path>
              </svg>
              <span *ngIf="!isSidebarMinimized() || isMobile()">{{ navLabel(item) }}</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Quick Actions -->
      <div class="px-2 py-2" style="border-top: 1px solid var(--theme-border)">
        <div *ngIf="!isSidebarMinimized() || isMobile()" class="space-y-0.5">
          <button *ngFor="let action of quickActions"
            class="w-full flex items-center gap-2.5 px-2.5 py-1.5 text-xs rounded-lg transition-all"
            style="color: var(--theme-text-muted)"
            onmouseover="this.style.background='var(--theme-hover)'; this.style.color='#ffffff'"
            onmouseout="this.style.background='transparent'; this.style.color='var(--theme-text-muted)'">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="action.icon"></path>
            </svg>
            <span>{{ action.label | transloco }}</span>
          </button>
        </div>
        <div *ngIf="isSidebarMinimized() && !isMobile()" class="space-y-0.5">
          <button *ngFor="let action of quickActions"
            class="w-full flex justify-center px-2 py-1.5 rounded-lg transition-all"
            style="color: var(--theme-text-dim)"
            [title]="action.label | transloco"
            onmouseover="this.style.background='var(--theme-hover)'; this.style.color='var(--theme-accent)'"
            onmouseout="this.style.background='transparent'; this.style.color='var(--theme-text-dim)'">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="action.icon"></path>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </aside>

  <!-- Main Content -->
  <main
    class="flex-1 overflow-y-auto bg-gray-50 transition-all duration-300"
    [class.mt-10]="isMobile()"
    [style.margin-left]="!isMobile() ? (isSidebarMinimized() ? '3.5rem' : '13rem') : '0'"
  >
    <!-- Desktop Header -->
    <div *ngIf="!isMobile()" class="sticky top-0 z-20" style="background: var(--theme-primary); border-bottom: 1px solid var(--theme-border); min-height: 40px">
      <div class="px-4 flex justify-end items-center gap-1.5" style="min-height: 40px">
        <!-- Language Picker -->
        <div class="lang-picker relative">
          <button
            (click)="toggleLangMenu(); $event.stopPropagation()"
            [title]="'shared.actions.changeLanguage' | transloco"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-lg transition-colors"
            style="color: var(--theme-text)"
            onmouseover="this.style.background='var(--theme-hover)'" onmouseout="this.style.background='transparent'"
          >
            <span class="text-xs font-medium">{{ currentLanguageLabel }}</span>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <div *ngIf="isLangMenuOpen()"
            class="absolute right-0 mt-1 w-36 rounded-lg shadow-xl overflow-hidden z-30"
            style="background: var(--theme-primary-light); border: 1px solid var(--theme-border)">
            <button *ngFor="let l of languages"
              (click)="selectLanguage(l.code)"
              class="w-full flex items-center gap-2 px-3 py-2 text-xs transition-colors"
              [style.color]="l.code === currentLanguageCode ? 'var(--theme-accent)' : 'var(--theme-text)'"
              [style.font-weight]="l.code === currentLanguageCode ? 600 : 400"
              onmouseover="this.style.background='var(--theme-hover)'" onmouseout="this.style.background='transparent'">
              <span class="flex-1 text-left">{{ l.nativeLabel }}</span>
              <svg *ngIf="l.code === currentLanguageCode" class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="w-px h-4 mx-0.5" style="background: var(--theme-border)"></div>

        <!-- Theme Picker -->
        <div class="theme-picker relative">
          <button
            (click)="toggleThemeMenu(); $event.stopPropagation()"
            [title]="'shared.actions.changeTheme' | transloco"
            class="flex items-center gap-1.5 px-2 py-1.5 rounded-lg transition-colors"
            style="color: var(--theme-text)"
            onmouseover="this.style.background='var(--theme-hover)'" onmouseout="this.style.background='transparent'"
          >
            <span class="w-4 h-4 rounded-full border" [style.background]="currentTheme.swatch" style="border-color: rgba(255,255,255,0.3)"></span>
            <span class="hidden lg:inline text-xs font-medium">{{ currentTheme.name }}</span>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <div *ngIf="isThemeMenuOpen()"
            class="absolute right-0 mt-1 w-44 rounded-lg shadow-xl overflow-hidden z-30"
            style="background: var(--theme-primary-light); border: 1px solid var(--theme-border)">
            <button *ngFor="let t of themes"
              (click)="selectTheme(t.id)"
              class="w-full flex items-center gap-2 px-3 py-2 text-xs transition-colors"
              [style.color]="t.id === currentThemeId ? 'var(--theme-accent)' : 'var(--theme-text)'"
              [style.font-weight]="t.id === currentThemeId ? 600 : 400"
              onmouseover="this.style.background='var(--theme-hover)'" onmouseout="this.style.background='transparent'">
              <span class="w-3.5 h-3.5 rounded-full border flex-shrink-0" [style.background]="t.swatch" style="border-color: rgba(255,255,255,0.3)"></span>
              <span class="flex-1 text-left">{{ t.name }}</span>
              <svg *ngIf="t.id === currentThemeId" class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="w-px h-4 mx-0.5" style="background: var(--theme-border)"></div>

        <button class="p-1.5 rounded-lg transition-colors relative" style="color: var(--theme-text)"
          onmouseover="this.style.background='var(--theme-hover)'" onmouseout="this.style.background='transparent'">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
          <span class="absolute top-0.5 right-0.5 w-1.5 h-1.5 bg-red-400 rounded-full"></span>
        </button>
        <div class="w-px h-4 mx-1" style="background: var(--theme-border)"></div>
        <div class="flex items-center gap-1.5 cursor-pointer rounded-lg px-2 transition-colors" style="min-height:40px"
          onmouseover="this.style.background='var(--theme-hover)'" onmouseout="this.style.background='transparent'">
          <img [src]="user.avatar" alt="Avatar" class="w-6 h-6 rounded-full" style="outline: 1px solid var(--theme-accent)">
          <div class="hidden lg:block">
            <p class="text-xs font-semibold text-white">{{ user.name }}</p>
            <p class="text-xs" style="color: var(--theme-accent)">{{ user.email }}</p>
          </div>
        </div>
        <button (click)="logout()" [title]="'shared.actions.logout' | transloco"
          class="p-1.5 rounded-lg transition-colors" style="color: var(--theme-text-muted)"
          onmouseover="this.style.background='rgba(239,68,68,0.15)'; this.style.color='#f87171'"
          onmouseout="this.style.background='transparent'; this.style.color='var(--theme-text-muted)'">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Page Content -->
    <div class="p-4 md:p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
