<div class="h-screen flex flex-col overflow-hidden bg-gray-50">
  <!-- Mobile Header - Minimal -->
  <div class="md:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-30 px-2 py-2">
    <div class="flex justify-between items-center">
      <button 
        (click)="toggleMobileMenu()" 
        class="p-1.5 rounded-lg hover:bg-gray-100 transition-colors"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
      <div class="font-bold text-base bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
        POS
      </div>
      <div class="w-5"></div>
    </div>
  </div>

  <!-- Sidebar Overlay (Mobile) -->
  <div 
    *ngIf="isMobile() && isMobileMenuOpen()" 
    class="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity duration-300"
    (click)="closeMobileMenu()"
  ></div>

  <!-- Sidebar -->
  <aside 
    [class]="'fixed left-0 top-0 h-full bg-gradient-to-b from-gray-900 to-gray-800 shadow-xl transition-all duration-300 z-50 overflow-y-auto ' + getSidebarWidthClass()"
    [class.overflow-hidden]="isMobile() && !isMobileMenuOpen()"
  >
    <div class="flex flex-col h-full">
      <!-- Logo Section - Compact -->
      <div class="flex items-center justify-between p-3 border-b border-gray-700">
        <div *ngIf="!isMobile() && (!isSidebarMinimized() || !isSidebarOpen())" class="flex items-center gap-2">
          <div class="w-7 h-7 bg-gradient-to-r from-blue-500 to-purple-500 rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-sm">P</span>
          </div>
          <span *ngIf="!isSidebarMinimized()" class="text-white font-semibold text-sm">POS</span>
        </div>
        <div *ngIf="isSidebarMinimized() && !isMobile()" class="w-full flex justify-center">
          <div class="w-7 h-7 bg-gradient-to-r from-blue-500 to-purple-500 rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-sm">P</span>
          </div>
        </div>
        <button 
          *ngIf="!isMobile()"
          (click)="toggleSidebar()" 
          class="p-1 rounded-lg hover:bg-gray-700 transition-colors text-gray-400 hover:text-white"
        >
          <svg *ngIf="!isSidebarMinimized()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
          </svg>
          <svg *ngIf="isSidebarMinimized()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
          </svg>
        </button>
        <button 
          *ngIf="isMobile()"
          (click)="closeMobileMenu()" 
          class="p-1 rounded-lg hover:bg-gray-700 transition-colors text-gray-400 hover:text-white"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- User Profile Section - Compact -->
      <div *ngIf="!isSidebarMinimized() || isMobile()" class="p-3 border-b border-gray-700">
        <div class="flex items-center gap-2">
          <img [src]="user.avatar" alt="Avatar" class="w-8 h-8 rounded-full">
          <div class="flex-1 min-w-0">
            <p class="text-white font-medium text-xs truncate">{{ user.name }}</p>
            <p class="text-gray-400 text-xs truncate">{{ user.email }}</p>
          </div>
        </div>
      </div>
      <div *ngIf="isSidebarMinimized() && !isMobile()" class="p-3 border-b border-gray-700 flex justify-center">
        <img [src]="user.avatar" alt="Avatar" class="w-8 h-8 rounded-full">
      </div>

      <!-- Navigation Menu - Compact -->
      <nav class="flex-1 overflow-y-auto py-2">
        <ul class="space-y-0.5">
          <li *ngFor="let item of navItems; let i = index">
            <a 
              [routerLink]="item.path"
              (click)="setActiveItem(i)"
              [class]="'flex items-center gap-2 px-3 py-2 text-xs transition-colors ' + 
                (item.active ? 'bg-blue-600 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white') +
                (isSidebarMinimized() && !isMobile() ? ' justify-center' : '')"
              [title]="isSidebarMinimized() && !isMobile() ? item.label : ''"
            >
              <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"></path>
              </svg>
              <span *ngIf="!isSidebarMinimized() || isMobile()" class="text-xs">{{ item.label }}</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Quick Actions - Compact -->
      <div *ngIf="!isSidebarMinimized() || isMobile()" class="p-3 border-t border-gray-700">
        <p class="text-gray-400 text-xs uppercase tracking-wider mb-2">Quick</p>
        <div class="space-y-1.5">
          <button *ngFor="let action of quickActions" 
            class="w-full flex items-center gap-2 px-2 py-1.5 text-xs rounded-lg bg-gray-800 hover:bg-gray-700 transition-colors text-gray-300 hover:text-white">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="action.icon"></path>
            </svg>
            <span>{{ action.label }}</span>
          </button>
        </div>
      </div>
      <div *ngIf="isSidebarMinimized() && !isMobile()" class="p-3 border-t border-gray-700">
        <div class="space-y-1.5">
          <button *ngFor="let action of quickActions" 
            class="w-full flex justify-center px-2 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 transition-colors text-gray-300 hover:text-white"
            [title]="action.label">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="action.icon"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content - Fixed scrolling -->
  <main 
    class="flex-1 overflow-y-auto bg-gray-50"
    [class.mt-12]="isMobile()"
    [style.margin-left]="!isMobile() ? (isSidebarMinimized() ? '4rem' : '16rem') : '0'"
  >
    <!-- Desktop Header - Minimal -->
    <div *ngIf="!isMobile()" class="bg-white border-b border-gray-200 sticky top-0 z-20">
      <div class="px-3 py-2 flex justify-between items-center">
        <div class="flex items-center gap-2">
          <button 
            (click)="toggleSidebar()" 
            class="p-1.5 rounded-lg hover:bg-gray-100 transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
          <h1 class="text-sm font-semibold text-gray-800">Dashboard</h1>
        </div>
        <div class="flex items-center gap-2">
          <button class="p-1.5 rounded-lg hover:bg-gray-100 transition-colors relative">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
            </svg>
            <span class="absolute top-0.5 right-0.5 w-1.5 h-1.5 bg-red-500 rounded-full"></span>
          </button>
          <div class="w-px h-5 bg-gray-200"></div>
          <div class="flex items-center gap-1.5 cursor-pointer hover:bg-gray-50 rounded-lg px-1.5 py-1">
            <img [src]="user.avatar" alt="Avatar" class="w-6 h-6 rounded-full">
            <div class="hidden lg:block">
              <p class="text-xs font-medium text-gray-700">{{ user.name }}</p>
              <p class="text-xs text-gray-500">Admin</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Page Content -->
    <div class="p-4 md:p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
